name: music_player
description: Advanced offline Music Player with Material Design 3
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # ── Audio Playback ────────────────────────────────────────────
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  audio_session: ^0.1.18

  # ── Local Media Library Scanning ─────────────────────────────
  on_audio_query: ^2.9.0

  # ── State Management ─────────────────────────────────────────
  provider: ^6.1.2

  # ── Dynamic Theming from Album Art ───────────────────────────
  palette_generator: ^0.3.3
  dynamic_color: ^1.6.8

  # ── Persistence ──────────────────────────────────────────────
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2

  # ── Permissions ──────────────────────────────────────────────
  permission_handler: ^11.3.0

  # ── Reactive Streams ─────────────────────────────────────────
  rxdart: ^0.27.7
  app_links: ^6.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21